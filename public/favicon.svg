<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purple-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Sleek premium rounded background with gradient border -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="#0b0f19" stroke="url(#purple-cyan)" stroke-width="16" filter="url(#glow)" />
  
  <!-- Centered high-tech leaf/bolt symbol symbolizing nutrition (leaf) and sport/AI (bolt) -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Path representing atomic/AI neural connections and leaf structure -->
    <path d="M256 40 C380 40 460 140 460 256 C460 380 340 472 256 472 C172 472 52 380 52 256 C52 140 132 40 256 40 Z" fill="none" stroke="url(#purple-cyan)" stroke-width="24" stroke-dasharray="12 12" />
    <!-- Dynamic Lightning Bolt / Leaf blade inner shape -->
    <path d="M256 80 L140 280 L230 280 L180 440 L380 200 L270 200 Z" fill="url(#purple-cyan)" />
  </g>
</svg>
